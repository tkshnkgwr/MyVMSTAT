name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: MyVMSTAT.exe
            release_name: MyVMSTAT-windows-amd64.zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: MyVMSTAT
            release_name: MyVMSTAT-linux-amd64.tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Windows Artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.artifact_name }}, LICENSE, README.md, README.ja.md -DestinationPath ${{ matrix.release_name }}

      - name: Package Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd target/${{ matrix.target }}/release && tar -czvf ../../../${{ matrix.release_name }} ${{ matrix.artifact_name }}
          cd ../../..
          tar -rvf ${{ matrix.release_name }} LICENSE README.md README.ja.md

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
